<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="arrow-lr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="420" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">log-replay — Deterministic Flight Data Recorder + Replay</text>

  <!-- Record Format -->
  <rect x="30" y="60" width="200" height="160" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="130" y="82" text-anchor="middle" font-weight="bold" fill="#92400e">Record Format (256B)</text>
  <rect x="45" y="95" width="170" height="50" rx="3" fill="white" stroke="#f59e0b"/>
  <text x="130" y="112" text-anchor="middle" fill="#1e293b" font-size="10">Header (16B)</text>
  <text x="130" y="128" text-anchor="middle" fill="#64748b" font-size="9">timestamp · type · ch · seq</text>
  <rect x="45" y="150" width="170" height="40" rx="3" fill="white" stroke="#f59e0b"/>
  <text x="130" y="168" text-anchor="middle" fill="#1e293b" font-size="10">Payload (240B)</text>
  <text x="130" y="182" text-anchor="middle" fill="#64748b" font-size="9">NavState · Engine · Event</text>
  <text x="130" y="208" text-anchor="middle" fill="#92400e" font-size="9">Fixed size · Typed access</text>

  <!-- Recorder -->
  <rect x="280" y="60" width="200" height="160" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="380" y="82" text-anchor="middle" font-weight="bold" fill="#1e40af">Recorder</text>
  <rect x="295" y="95" width="170" height="28" rx="3" fill="white" stroke="#3b82f6"/>
  <text x="380" y="114" text-anchor="middle" fill="#1e293b" font-size="10">Bounded Buffer</text>
  <rect x="295" y="130" width="170" height="28" rx="3" fill="white" stroke="#3b82f6"/>
  <text x="380" y="149" text-anchor="middle" fill="#1e293b" font-size="10">Append-Only Write</text>
  <rect x="295" y="165" width="170" height="28" rx="3" fill="white" stroke="#3b82f6"/>
  <text x="380" y="184" text-anchor="middle" fill="#1e293b" font-size="10">Event Markers</text>
  <text x="380" y="210" text-anchor="middle" fill="#1e40af" font-size="9">No allocation · File export</text>

  <!-- Binary File -->
  <rect x="530" y="90" width="100" height="80" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="580" y="115" text-anchor="middle" font-weight="bold" fill="#475569" font-size="11">.bin</text>
  <text x="580" y="135" text-anchor="middle" fill="#64748b" font-size="10">Sequential</text>
  <text x="580" y="150" text-anchor="middle" fill="#64748b" font-size="10">256B × N</text>

  <!-- Player -->
  <rect x="680" y="60" width="200" height="160" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="780" y="82" text-anchor="middle" font-weight="bold" fill="#065f46">Player</text>
  <rect x="695" y="95" width="170" height="28" rx="3" fill="white" stroke="#10b981"/>
  <text x="780" y="114" text-anchor="middle" fill="#1e293b" font-size="10">Sequential Replay</text>
  <rect x="695" y="130" width="170" height="28" rx="3" fill="white" stroke="#10b981"/>
  <text x="780" y="149" text-anchor="middle" fill="#1e293b" font-size="10">Type/Channel Filter</text>
  <rect x="695" y="165" width="170" height="28" rx="3" fill="white" stroke="#10b981"/>
  <text x="780" y="184" text-anchor="middle" fill="#1e293b" font-size="10">Seek + Step</text>
  <text x="780" y="210" text-anchor="middle" fill="#065f46" font-size="9">File + buffer loading</text>

  <!-- Arrows -->
  <line x1="230" y1="140" x2="280" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-lr)"/>
  <line x1="480" y1="130" x2="530" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-lr)"/>
  <line x1="630" y1="130" x2="680" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-lr)"/>

  <!-- Comparison block -->
  <rect x="280" y="270" width="400" height="90" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="480" y="295" text-anchor="middle" font-weight="bold" fill="#b91c1c">Bit-Exact Comparison</text>
  <text x="480" y="318" text-anchor="middle" fill="#b91c1c" font-size="11">Recording A vs Recording B → byte-identical check</text>
  <text x="480" y="338" text-anchor="middle" fill="#b91c1c" font-size="11">first_difference() → pinpoint divergence record index</text>

  <!-- Arrows to comparison -->
  <path d="M380,220 L380,270" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-lr)" fill="none"/>
  <path d="M780,220 L780,315 L680,315" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-lr)" fill="none"/>

  <!-- Footer -->
  <text x="450" y="400" text-anchor="middle" fill="#94a3b8" font-size="10">Research prototype — not certified to any standard. Apache-2.0.</text>
</svg>
